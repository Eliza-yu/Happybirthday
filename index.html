<!DOCTYPE html>
<html>
<head>
  <title>Birthday Game</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
  <button id="startBtn">START</button>
</div>

<!-- GAME -->
<div id="stage">
  <div id="game">

    <canvas id="confetti"></canvas>

    <img id="background" src="bg1.png">

    <div id="characterBox">
      <img id="character" src="character1.PNG">
    </div>

    <div id="dialogue">Is it your birthday?</div>

    <div id="choices">
      <button id="yesBtn">Yes</button>
      <button id="noBtn">No</button>
    </div>
  <img id="gift" src="gift.png" style=" display:none; position:absolute; left:50%; bottom:2%; transform:translateX(-50%); width:120px; z-index:5; cursor:pointer; ">
 <img id="scare" src="characterscare.PNG" style="display:none; position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:20;">
  </div>
</div>

<div id="ageBox" style="display:none;">
  <input id="ageInput" type="text" placeholder="Type age..." />
  <button id="ageSubmit">OK</button>
</div>
  
<!-- AUDIO -->
<audio id="song" src="audio1.mp3" loop></audio>
<audio id="songHappy" src="audio.mp3"></audio>
<audio id="scareAudio" src="scare.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
